<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abaya – عبايات راقية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="#collection" class="nav-cta">تسوّقي الآن</a>
    <div class="nav-logo">A<span>b</span>aya</div>
  </nav>

  <section id="hero">
    <div class="hero-text">
      <div class="hero-badge">✦ تشكيلة احدث العبايات </div>
      <h1 class="hero-title">
        الأناقة<br />
        في كل <em>تفصيل</em>
      </h1>
      <p class="hero-sub">
        عبايات مصممة بعناية لتجمع بين الرقي والراحة — خامات فاخرة وتفاصيل لا تُنسى.
      </p>
      <a href="#collection" class="hero-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
        استعرضي التشكيلة
      </a>
    </div>

    <div class="hero-img-wrap">
      <img
        src="images/3.avif"
        alt="موديل عباية أنيقة"
        loading="eager"
      />
      <div class="hero-img-overlay"></div>
    </div>
  </section>

  <div class="divider">تشكيلتنا</div>

  <section id="collection">
    <div class="section-header">
      <h2 class="section-title">أحدث العبايات</h2>
      <p class="section-sub">خامات مختارة وتصاميم حصرية — اطلبي موديلك مباشرة</p>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </section>

  <footer>
    <span class="footer-logo">Abaya</span>
    جميع الطلبات تتم عبر واتساب · التوصيل لجميع أنحاء مصر
  </footer>

  <script src="app.js"></script>
</body>
</html>
